services:
  db:
    image: postgres:15
    container_name: lfg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nanaut
      POSTGRES_PASSWORD: nanaut
      POSTGRES_DB: dev-lfg-db
    ports:
      - "5432:5432"
    volumes:
      - lfg_pgdata:/var/lib/postgresql/data

volumes:
  lfg_pgdata: